---
layout: default
---
<div class="home">
	<section class="site-header">
		<h1 class="smallcap"><a class="site-title" href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
		<p>Hello, this is <code>YpL</code>, a junior android developer. Page hosted at <a href="https://gitee.com/inkt">GitEE</a>, using theme  <a href="https://github.com/heiswayi/textlog">TextLog</a>.</p>
		<blockquote>
			<p><h2><a href="/tagged">Less is more!</a></h2></p>
		</blockquote>
	</section>
	<section>
		<ul class="post-list">
			{% for post in site.posts %}
			<li>
				<a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>&nbsp;&nbsp;<time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %d, %Y" }}</time>
			</li>
			{% endfor %}
		</ul>
	</section>
</div>
